<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVASCRIPT #1. Introducción, ubicación, variables e if</title>
    <script>
        var nombre = prompt("dime tu nombre");
        alert("Bienvenidos a mi página " + nombre);
        let x = 5;
        let y = 6;
        let z = x + y;
        alert("z: " + z);
        let edad = prompt("Dime tu edad");
        let mensaje = "";
        if (edad < 18) {
            mensaje = "No puedes acceder a esta página";
            alert("entrada");
        } else {
            mensaje = "Bienvenido a esta página";


        }

        alert("mensaje" + mensaje);

    </script>
</head>
